# Spring boot server port
server.port=8080

# Database configurations using H2 in-memory
spring.datasource.url=jdbc:h2:mem:homestaydb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console configuration (for UI inspection if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JWT security secrets
jwt.secret=9a4f2c4675f284ced1213456c123456789abcdef0123456789abcdef0123456789abc
jwt.expiration=86400000
